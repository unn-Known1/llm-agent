name: Bug Report
description: Report a bug or unexpected behavior
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        ## 🐛 Bug Report

        ### Description
        A clear and concise description of what the bug is.

        ### Steps to Reproduce
        1. Go to '...'
        2. Run '...'
        3. See error

        ### Expected Behavior
        What you expected to happen.

        ### Actual Behavior
        What actually happened.

        ### Environment
        - OS: [e.g. macOS, Linux, Windows]
        - Python version: [e.g. 3.10]
        - Model: [e.g. GPT-4o, Ollama/llama3]
        - API URL: [e.g. https://api.openai.com/v1]

  - type: input
    id: version
    attributes:
      label: Version
      description: llm-agent version (run `python llm-agent.py --version`)
      placeholder: "1.0.0"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Log Output
      description: Paste any error messages or stack traces
      placeholder: |
        Traceback (most recent call last):
          ...
    validations:
      required: false